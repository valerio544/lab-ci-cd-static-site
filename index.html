<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamble Click</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="box">
        <h1>GAMBLE CLICK</h1>
        <p>premi e spera</p>

        <button onclick="play()">SPIN</button>
        <h2 id="result"></h2>
    </div>

    <script>
        function play() {
            const win = Math.random() > 0.5;
            document.getElementById("result").textContent = win ? "WIN 💰" : "LOSE 💀";
        }
    </script>
</body>

</html>
